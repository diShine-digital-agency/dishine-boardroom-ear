version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  brief:
    format: "[%(levelname)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: brief
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: transcripts/boardroom_ear.log
    maxBytes: 5242880   # 5 MB
    backupCount: 3
    encoding: utf-8
    delay: true

root:
  level: DEBUG
  handlers: [console, file]

loggers:
  core:
    level: DEBUG
    propagate: true
  analysis:
    level: DEBUG
    propagate: true
  __main__:
    level: DEBUG
    propagate: true
